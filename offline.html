<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#dc2626" />
    <title>Sin conexion | RedJob</title>
    <style>
      * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; background: #f8fafc; color: #111111; font-family: Inter, system-ui, sans-serif; }
      main { width: min(100%, 480px); border: 1px solid #e5e7eb; border-radius: 20px; padding: 32px; background: #ffffff; text-align: center; box-shadow: 0 20px 56px rgba(15, 23, 42, 0.1); }
      img { width: 96px; height: 96px; object-fit: contain; }
      h1 { margin: 18px 0 10px; font-size: 28px; }
      p { margin: 0 0 24px; color: #64748b; line-height: 1.6; }
      a { min-height: 48px; display: inline-flex; align-items: center; border-radius: 14px; padding: 0 22px; background: #dc2626; color: #ffffff; font: inherit; font-weight: 700; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <img src="/assets/redjob-icon-192.png" alt="RedJob" />
      <h1>No pudimos conectar con RedJob</h1>
      <p>Revisa tu conexión o intenta nuevamente en unos momentos. El servicio local también debe estar iniciado para abrir localhost.</p>
      <a href="/">Intentar de nuevo</a>
    </main>
  </body>
</html>
